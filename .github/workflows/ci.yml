name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Build krudds7 and run a small behavioural smoke test. This is the gate that
  # keeps the interpreter compiling and the front door (REPL / -e / -p / script
  # runner) behaving as the tree moves.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install a C compiler
        run: sudo apt-get update && sudo apt-get install -y clang gcc curl

      # The released version is the single line in version.txt, maintained by
      # release-please. A push/main build stamps that verbatim; a PR build
      # appends -pr<N>+<sha> so a preview binary can never be mistaken for a
      # real release. Kept POSIX (printf '%.7s') so it runs under any /bin/sh.
      - name: Determine version
        id: version
        run: |
          base=$(tr -d ' \t\n\r' < version.txt)
          if [ "${{ github.event_name }}" = pull_request ]; then
            short=$(printf '%.7s' "${{ github.event.pull_request.head.sha }}")
            echo "version=${base}-pr${{ github.event.pull_request.number }}+${short}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${base}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          KRUDDS7_VERSION: ${{ steps.version.outputs.version }}
        run: ./krudds7.sh build

      - name: Smoke test
        run: sh tools/smoke.sh ./krudds7

  # Build the linkable static libs (the release products of issue #11) so they
  # can't rot: a change that breaks the native or wasm archive fails here, on
  # the PR, instead of at release time. Mirrors the release job's build-lib.sh
  # invocations, then link-tests the native archive to prove it's usable, not
  # just that it archives.
  libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install a C compiler
        run: sudo apt-get update && sudo apt-get install -y clang curl

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build native + wasm static libs
        run: |
          ./tools/build-lib.sh native dist
          ./tools/build-lib.sh wasm dist
          ( cd dist && sha256sum -c \
              libs7-linux-x86_64.a.sha256 \
              libs7-wasm32.a.sha256 \
              s7.h.sha256 )

      - name: Link-test the native lib
        run: |
          cat > probe.c <<'EOF'
          #include "s7.h"
          #include <stdio.h>
          int main(void) {
            s7_scheme *s7 = s7_init();
            printf("%s\n", s7_object_to_c_string(s7, s7_eval_c_string(s7, "(+ 40 2)")));
            return 0;
          }
          EOF
          cc -O2 -Idist probe.c dist/libs7-linux-x86_64.a -lm -o probe
          test "$(./probe)" = 42

  # Native Windows build, MinGW-w64 via MSYS2. This runs on windows-latest rather
  # than cross-compiling from ubuntu deliberately: a cross build proves only that
  # the code compiles and links, and the failures worth catching here are runtime
  # ones — isatty() on a Windows console, argv path translation when a POSIX path
  # reaches a native binary, CRT differences in fgets/realloc. Running the real
  # tools/smoke.sh against the real krudds7.exe is the only thing that sees those.
  #
  # MINGW64 (not MSYS) is the target: it produces a native Windows binary with no
  # msys-2.0.dll runtime dependency, which is what a release asset has to be.
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            coreutils

      # Same version scheme as the ubuntu build job, so a Windows preview binary
      # is labelled identically to its Linux counterpart.
      - name: Determine version
        id: version
        run: |
          base=$(tr -d ' \t\n\r' < version.txt)
          if [ "${{ github.event_name }}" = pull_request ]; then
            short=$(printf '%.7s' "${{ github.event.pull_request.head.sha }}")
            echo "version=${base}-pr${{ github.event.pull_request.number }}+${short}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${base}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the CLI
        env:
          KRUDDS7_VERSION: ${{ steps.version.outputs.version }}
        run: ./krudds7.sh build

      # The binary must run on a machine with no MSYS2 or MinGW installed. Every
      # step in this job executes inside MSYS2, where /mingw64/bin is on PATH, so
      # a binary importing libwinpthread-1.dll passes the whole smoke suite here
      # and then dies at load with STATUS_DLL_NOT_FOUND on a clean Windows box.
      # v0.4.0 shipped exactly that.
      #
      # Checking for msys-2.0.dll alone is NOT sufficient — that only catches an
      # MSYS-flavoured build, and the MinGW runtime DLLs are a separate problem.
      # Assert instead that nothing the binary imports resolves inside the
      # toolchain prefix, which covers both.
      - name: Assert the binary is self-contained
        run: |
          ldd ./krudds7.exe
          if ldd ./krudds7.exe | grep -iE '=> */(mingw64|msys|usr)/'; then
            echo "" >&2
            echo "krudds7.exe imports DLLs from the MSYS2/MinGW prefix, listed above." >&2
            echo "Those are absent on a clean Windows machine; the binary would fail" >&2
            echo "to start with STATUS_DLL_NOT_FOUND. Link it with -static." >&2
            exit 1
          fi
          echo "ok - self-contained: only system DLLs imported"

      - name: Smoke test
        run: sh tools/smoke.sh ./krudds7.exe

      - name: Build the Windows static lib
        run: |
          S7_LIB_TRIPLE=windows-x86_64 ./tools/build-lib.sh native dist
          ( cd dist && sha256sum -c libs7-windows-x86_64.a.sha256 s7.h.sha256 )

      # Mirrors the linux link-test: prove the archive is usable, not merely that
      # it archives.
      - name: Link-test the Windows lib
        run: |
          cat > probe.c <<'EOF'
          #include "s7.h"
          #include <stdio.h>
          int main(void) {
            s7_scheme *s7 = s7_init();
            printf("%s\n", s7_object_to_c_string(s7, s7_eval_c_string(s7, "(+ 40 2)")));
            return 0;
          }
          EOF
          gcc -O2 -Idist probe.c dist/libs7-windows-x86_64.a -lm -o probe.exe
          test "$(./probe.exe)" = 42

  # Build + run the smoke test under AddressSanitizer + UBSan + LeakSanitizer.
  # This gate polices OUR code (src/krudds7.c, and future tests) for leaks,
  # out-of-bounds accesses, and undefined behaviour. The vendored interpreter
  # (third_party/s7.c) is compiled WITHOUT instrumentation on purpose: it is
  # upstream code we don't own, and we don't want the gate to fail on s7's own
  # deliberate tricks (e.g. its x86 unaligned reads). As krudds7 grows its own C
  # surface, that surface stays fully covered here.
  # gcc is used because its libasan/libubsan runtimes ship with the runner image.
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc curl

      - name: Build under ASan + UBSan + LeakSanitizer
        env:
          CC: gcc
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          # Verify (or fetch) the pinned s7 sources, same as krudds7.sh does.
          root="$PWD"
          . ./third_party/sync.sh

          # Instrument our own code with the sanitizers.
          gcc -O1 -g -w -fno-omit-frame-pointer \
            -fsanitize=address,undefined -fno-sanitize-recover=undefined \
            -DWITH_C_LOADER=0 -DWITH_MAIN=0 -DKRUDDS7_VERSION='"ci-san"' \
            -Ithird_party -c src/krudds7.c -o krudds7.o

          # Compile the vendored interpreter plain: no -fsanitize, so ASan/UBSan
          # do not police s7's internals. (LeakSanitizer still sees s7's heap
          # allocations because it intercepts malloc/calloc at link time; its
          # intentional permanent allocations are whitelisted via the LSan
          # suppressions file used in the smoke step below.)
          gcc -O1 -g -w -fno-omit-frame-pointer \
            -DWITH_C_LOADER=0 -DWITH_MAIN=0 \
            -Ithird_party -c third_party/s7.c -o s7.o

          # Link with the sanitizer runtime so krudds7.o stays instrumented.
          gcc -fsanitize=address,undefined krudds7.o s7.o -o krudds7 -lm

      - name: Smoke test under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          # s7 makes permanent, never-freed allocations during init; whitelist
          # them so the leak gate polices our code, not s7's by-design internals.
          LSAN_OPTIONS: suppressions=tools/lsan.supp
        run: sh tools/smoke.sh ./krudds7
